<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Learning Test - ChobShop</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #6366f1; }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #6366f1;
        }
        .stat-label {
            color: #cbd5e1;
            margin-top: 8px;
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover { background: #818cf8; }
        button.success { background: #10b981; }
        button.warning { background: #f59e0b; }
        button.danger { background: #ef4444; }
        input, select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            margin: 5px 0;
        }
        .log {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-item { margin: 5px 0; }
        .log-success { color: #10b981; }
        .log-error { color: #ef4444; }
        .log-info { color: #6366f1; }
    </style>
</head>
<body>
    <h1>🧠 AI Learning Test Page</h1>
    
    <div class="stat-grid">
        <div class="stat-card">
            <div class="stat-value" id="totalPredictions">0</div>
            <div class="stat-label">Total Predictions</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="correctPredictions">0</div>
            <div class="stat-label">Correct Predictions</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="accuracy">0%</div>
            <div class="stat-label">Accuracy</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="corrections">0</div>
            <div class="stat-label">Corrections</div>
        </div>
    </div>

    <div class="card">
        <h2>📝 Test Categorization</h2>
        <input type="text" id="testTitle" placeholder="Enter product title..." />
        <button onclick="testCategorize()" class="success">Test Categorize</button>
        <div id="categorizeResult" style="margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 8px; display: none;"></div>
    </div>

    <div class="card">
        <h2>🎓 Submit Correction</h2>
        <input type="text" id="learnTitle" placeholder="Product title" />
        <input type="text" id="learnPredicted" placeholder="Predicted category" readonly />
        <select id="learnCorrect">
            <option value="">Select correct category...</option>
            <option value="โทรศัพท์มือถือและอุปกรณ์เสริม">📱 โทรศัพท์มือถือ</option>
            <option value="คอมพิวเตอร์และแล็ปท็อป">💻 คอมพิวเตอร์</option>
            <option value="เครื่องเสียง">🎧 เครื่องเสียง</option>
            <option value="เสื้อผ้าผู้หญิง">👗 เสื้อผ้าผู้หญิง</option>
            <option value="เสื้อผ้าผู้ชาย">👔 เสื้อผ้าผู้ชาย</option>
            <option value="ความงาม">💄 ความงาม</option>
            <option value="อื่นๆ">📦 อื่นๆ</option>
        </select>
        <button onclick="submitCorrection()" class="success">Submit Correction</button>
    </div>

    <div class="card">
        <h2>⚙️ Actions</h2>
        <button onclick="loadStats()">🔄 Refresh Stats</button>
        <button onclick="exportData()" class="success">💾 Export</button>
        <button onclick="importData()" class="warning">📥 Import</button>
        <button onclick="resetData()" class="danger">🗑️ Reset</button>
    </div>

    <div class="card">
        <h2>📋 Logs</h2>
        <div class="log" id="log"></div>
    </div>

    <script>
        const API_BASE = '';
        let authToken = localStorage.getItem('adminToken') || '';

        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const item = document.createElement('div');
            item.className = `log-item log-${type}`;
            item.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(item);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function fetchWithAuth(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...(authToken ? { 'Authorization': `Bearer ${authToken}` } : {})
            };
            const res = await fetch(`${API_BASE}${url}`, { ...options, headers });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        }

        async function loadStats() {
            try {
                log('Loading stats...', 'info');
                const data = await fetchWithAuth('/api/ai/stats');
                document.getElementById('totalPredictions').innerText = data.totalPredictions;
                document.getElementById('correctPredictions').innerText = data.correctPredictions;
                document.getElementById('accuracy').innerText = data.accuracy;
                document.getElementById('corrections').innerText = data.totalCorrections;
                log(`Stats loaded: ${data.totalPredictions} predictions, ${data.accuracy} accuracy`, 'success');
            } catch (err) {
                log(`Error loading stats: ${err.message}`, 'error');
            }
        }

        async function testCategorize() {
            const title = document.getElementById('testTitle').value.trim();
            if (!title) {
                log('Please enter a product title', 'error');
                return;
            }

            try {
                log(`Testing categorization: "${title}"`, 'info');
                const data = await fetchWithAuth('/api/categorize', {
                    method: 'POST',
                    body: JSON.stringify({ title })
                });

                const resultDiv = document.getElementById('categorizeResult');
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <strong>Result:</strong> ${data.category}<br/>
                    <strong>Learning Enabled:</strong> ${data.learningEnabled}
                `;

                document.getElementById('learnTitle').value = title;
                document.getElementById('learnPredicted').value = data.category;

                log(`Categorized as: ${data.category}`, 'success');
                await loadStats();
            } catch (err) {
                log(`Error: ${err.message}`, 'error');
            }
        }

        async function submitCorrection() {
            const title = document.getElementById('learnTitle').value.trim();
            const predicted = document.getElementById('learnPredicted').value.trim();
            const correct = document.getElementById('learnCorrect').value;

            if (!title || !predicted || !correct) {
                log('Please fill all fields', 'error');
                return;
            }

            try {
                log(`Submitting correction: ${predicted} → ${correct}`, 'info');
                const data = await fetchWithAuth('/api/ai/learn/correct', {
                    method: 'POST',
                    body: JSON.stringify({ title, predictedCategory: predicted, correctCategory: correct })
                });

                log(`Correction submitted: ${data.message}`, 'success');
                document.getElementById('learnTitle').value = '';
                document.getElementById('learnPredicted').value = '';
                document.getElementById('learnCorrect').value = '';
                await loadStats();
            } catch (err) {
                log(`Error: ${err.message}`, 'error');
            }
        }

        async function exportData() {
            try {
                log('Exporting learning data...', 'info');
                const data = await fetchWithAuth('/api/ai/export');
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ai_learning_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                log('Export successful!', 'success');
            } catch (err) {
                log(`Error: ${err.message}`, 'error');
            }
        }

        async function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                try {
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        const data = JSON.parse(event.target.result);
                        await fetchWithAuth('/api/ai/import', {
                            method: 'POST',
                            body: JSON.stringify(data)
                        });
                        log('Import successful!', 'success');
                        await loadStats();
                    };
                    reader.readAsText(file);
                } catch (err) {
                    log(`Error: ${err.message}`, 'error');
                }
            };
            input.click();
        }

        async function resetData() {
            if (!confirm('Are you sure? All learning data will be deleted!')) return;

            try {
                await fetchWithAuth('/api/ai/reset', { method: 'POST' });
                log('Reset successful!', 'success');
                await loadStats();
            } catch (err) {
                log(`Error: ${err.message}`, 'error');
            }
        }

        // Auth check
        function checkAuth() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            if (token) {
                authToken = token;
                localStorage.setItem('adminToken', token);
            }
        }

        // Initialize
        checkAuth();
        loadStats();
        log('AI Learning Test Page loaded', 'info');
    </script>
</body>
</html>
